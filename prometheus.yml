global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Scrapes the FastAPI /metrics endpoint.
  # host.docker.internal resolves to the host machine from inside Docker Desktop
  # (Windows & macOS). On Linux add extra_hosts: host.docker.internal:host-gateway
  # to the prometheus service in docker-compose.yml (already done).
  - job_name: "madrl_api"
    static_configs:
      - targets: ["host.docker.internal:8000"]
    metrics_path: /metrics
    scrape_interval: 10s

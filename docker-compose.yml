version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4
    ports:
      - "8000:8000"
    env_file: .env.docker
    volumes:
      - model_store:/app/model_store
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A app.workers.tasks worker --loglevel=info --concurrency=2
    env_file: .env.docker
    volumes:
      - model_store:/app/model_store
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "2.0"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test:
        [
          "CMD",
          "celery",
          "-A",
          "app.workers.tasks",
          "inspect",
          "ping",
          "-d",
          "celery@$$HOSTNAME",
        ]
      interval: 30s
      timeout: 10s
      retries: 3

  beat:
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A app.workers.tasks beat --loglevel=info
    env_file: .env.docker
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.25"
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  flower:
    image: mher/flower:2.0.1
    command: sh -c 'celery flower --broker=redis://redis:6379/1 --port=5555 --basic-auth=admin:$$FLOWER_PASSWORD'
    ports:
      - "127.0.0.1:5555:5555"
    env_file: .env.docker
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  redis:
    image: redis:7-alpine
    command: sh -c 'redis-server --appendonly yes --requirepass "$$REDIS_PASSWORD"'
    env_file: .env.docker
    volumes:
      - redis_data:/data
    expose:
      - "6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  prometheus:
    image: prom/prometheus:v2.52.0
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "127.0.0.1:9090:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

volumes:
  redis_data:
    name: madrl_portfolio_redis_data
  model_store:
    name: madrl_portfolio_model_store
